<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrícula SENAI</title>
  </head>

  <body>
    <header>
      <a href="index.html">Voltar para a Home</a>
    </header>

    <main>
      <h2>Intenção de Matrícula</h2>

      <form>
        <div>
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required />
        </div>

        <br />

        <div>
          <label for="email">E-mail:</label>
          <input type="email" id="email" name="email" required />
        </div>

        <br />

        <div>
          <label for="curso">Curso:</label>
          <select id="curso" name="curso">
            <option>Mecânica</option>
            <option>TI</option>
            <option>Elétrica</option>
          </select>
        </div>

        <br />

        <div>
          <p>Turno:</p>

          <input type="radio" id="manha" name="turno" />
          <label for="manha">Manhã</label>

          <input type="radio" id="tarde" name="turno" />
          <label for="tarde">Tarde</label>

          <input type="radio" id="noite" name="turno" />
          <label for="noite">Noite</label>
        </div>

        <br />

        <button type="submit">Enviar Intenção</button>
      </form>
    </main>

    <footer>
      <p>Portal SENAI</p>
    </footer>
  </body>
</html>
